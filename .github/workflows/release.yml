name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0). Leave empty to auto-bump patch.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"

          if [ -n "$VERSION" ]; then
            # Normalize: ensure v prefix
            VERSION="${VERSION#v}"
            VERSION="v${VERSION}"

            # Check if tag already exists
            if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
              echo "ERROR: Tag ${VERSION} already exists." >&2
              exit 1
            fi
          else
            # Auto-bump: get latest tag, increment patch
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              echo "ERROR: No existing tags found. Please provide a version manually." >&2
              exit 1
            fi
            # Parse major.minor.patch, strip v prefix
            LATEST="${LATEST#v}"
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing: ${VERSION}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (amd64)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=${VERSION}" \
            -o lxc-manager-linux-amd64 ./cmd/lxc-manager

      - name: Build (arm64)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X main.version=${VERSION}" \
            -o lxc-manager-linux-arm64 ./cmd/lxc-manager

      - name: Create tag and release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes "Release ${VERSION}" \
            lxc-manager-linux-amd64 \
            lxc-manager-linux-arm64
